  function renderClearanceProofStatus(item) {
    var parts = [];

    if (item.email_sent_at) {
      parts.push('<div><strong>Email marked sent:</strong> ' + escapeHtml(item.email_sent_at) + (item.email_sent_by ? ' by ' + escapeHtml(item.email_sent_by) : '') + '</div>');
    } else {
      parts.push('<div><strong>Email marked sent:</strong> Not yet marked sent.</div>');
    }

    if (item.email_sent_proof_note) {
      parts.push('<div><strong>Sent proof:</strong> ' + escapeHtml(item.email_sent_proof_note) + '</div>');
    }

    if (item.response_received_at) {
      parts.push('<div><strong>Response received:</strong> ' + escapeHtml(item.response_received_at) + '</div>');
    } else {
      parts.push('<div><strong>Response received:</strong> Not yet logged.</div>');
    }

    if (item.response_summary) {
      parts.push('<div><strong>Response summary:</strong> ' + escapeHtml(item.response_summary) + '</div>');
    }

    if (item.manager_proof_note) {
      parts.push('<div><strong>Manager proof:</strong> ' + escapeHtml(item.manager_proof_note) + '</div>');
    }

    return '<div class="vc-proof-status">' + parts.join('') + '</div>';
  }


  function showClearanceEmailStatus(row, message, kind) {
    if (!row) return;
    var box = row.querySelector('.vc-email-status');
    if (!box) return;
    box.className = 'vc-email-status active' + (kind ? ' ' + kind : '');
    box.textContent = message || '';
  }

  function clearClearanceEmailStatus(row) {
    if (!row) return;
    var box = row.querySelector('.vc-email-status');
    if (!box) return;
    box.className = 'vc-email-status';
    box.textContent = '';
  }

  async function sendClearanceDraftEmail(dealId, row, emailId, toEmail) {
    var subjectEl = row ? row.querySelector('.vc-draft-subject') : null;
    var bodyEl = row ? row.querySelector('.vc-draft-body') : null;

    var payload = {
      deal_id: dealId,
      email_id: emailId,
      to_email: toEmail || '',
      subject: subjectEl ? subjectEl.textContent : '',
      body: bodyEl ? bodyEl.textContent : '',
      sent_by: 'operator',
      from_email: 'teamscher@servicedepartment.ai',
      from_name: 'Team Scher'
    };

    var response = await fetch('./api/claire-dealview/send-clearance-email', {
      credentials: 'same-origin',
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Accept': 'application/json'
      },
      cache: 'no-store',
      body: JSON.stringify(payload)
    });

    var text = await response.text();
    var data = null;

    try {
      data = text ? JSON.parse(text) : {};
    } catch (jsonErr) {
      var clean = text.replace(/<[^>]*>/g, ' ').replace(/\s+/g, ' ').trim();
      throw new Error('Clearance send route returned non-JSON response. HTTP ' + response.status + '. ' + clean.slice(0, 220));
    }

    if (!response.ok || !data.ok) {
      throw new Error((data && data.error) || ('Send failed HTTP ' + response.status));
    }

    var proofNote = row.querySelector('.vc-sent-proof-note');
    if (proofNote && !String(proofNote.value || '').trim()) {
      proofNote.value = 'Sent from teamscher@servicedepartment.ai to ' + (toEmail || 'recipient') + ' through Deal Desk.';
    }

    var taskId = row.getAttribute('data-task');
    if (taskId) {
      try {
        await postClearanceProof(dealId, taskId, collectClearanceProofPayload(row, 'mark_sent'));
      } catch (proofErr) {
        showClearanceEmailStatus(row, 'Email sent, but sent-proof could not be recorded: ' + proofErr.message, 'warning');
        return data;
      }
    }

    showClearanceEmailStatus(row, 'Email sent from teamscher@servicedepartment.ai to ' + (toEmail || 'recipient') + '.', '');
    return data;
  }


  function renderVisualClearancePath(section, dealId, items) {
    var completeCount = items.filter(function(item) {
      return item.control_state === 'complete' || item.control_state === 'not_applicable';
    }).length;

    var rows = items.map(function(item) {
      var state = item.control_state || 'open';
      var title = item.task_name || item.category || 'Clearance item';
      var evidence = item.clearance_evidence || item.operator_status_note || item.verification_notes || item.notes || '';
      var waiting = item.waiting_on_name ? 'Waiting on: ' + item.waiting_on_name : '';
      var source = item.clearance_source || 'system_default';

      return [
        '<div class="visual-clearance-row ' + escapeHtml(state) + '" data-task="' + escapeHtml(item.public_id) + '">',
          '<div class="visual-clearance-main">',
            '<div class="visual-clearance-symbol">' + escapeHtml(item.visual_symbol || '[ ]') + '</div>',
            '<div>',
              '<div class="visual-clearance-title">' + escapeHtml(title) + '</div>',
              '<div class="visual-clearance-meta">',
                escapeHtml(item.control_label || 'Open'),
                ' - Source: ', escapeHtml(sourceLabel(source)),
                waiting ? ' - ' + escapeHtml(waiting) : '',
              '</div>',
              evidence ? '<div class="visual-clearance-evidence">' + escapeHtml(evidence) + '</div>' : '',
            '</div>',
          '</div>',
          '<div class="visual-clearance-controls">',
            '<select class="vc-state">',
              '<option value="open"' + (state === 'open' ? ' selected' : '') + '>Open</option>',
              '<option value="complete"' + (state === 'complete' ? ' selected' : '') + '>Complete</option>',
              '<option value="needs_followup"' + (state === 'needs_followup' ? ' selected' : '') + '>Needs Follow-up</option>',
              '<option value="not_applicable"' + (state === 'not_applicable' ? ' selected' : '') + '>Not Applicable</option>',
            '</select>',
            '<select class="vc-source">',
              '<option value="operator_entered"' + (source === 'operator_entered' ? ' selected' : '') + '>Operator Entered</option>',
              '<option value="deal_sheet"' + (source === 'deal_sheet' ? ' selected' : '') + '>Deal Sheet</option>',
              '<option value="communication_log"' + (source === 'communication_log' ? ' selected' : '') + '>Communication Log</option>',
              '<option value="ai_suggested"' + (source === 'ai_suggested' ? ' selected' : '') + '>AI Suggested</option>',
              '<option value="system_default"' + (source === 'system_default' ? ' selected' : '') + '>System Default</option>',
            '</select>',
            '<input class="vc-note" value="' + escapeHtml(evidence) + '" placeholder="Evidence / note, e.g. Inspection complete per operator">',
            '<div class="vc-contact-fields">',
              '<input class="vc-contact-name" value="' + escapeHtml(item.office_contact_name || item.waiting_on_name || '') + '" placeholder="Recipient / contact name">',
              '<input class="vc-contact-email" value="' + escapeHtml(item.office_contact_email || '') + '" placeholder="Recipient email">',
              '<input class="vc-contact-phone" value="' + escapeHtml(item.office_contact_phone || '') + '" placeholder="Phone, optional">',
            '</div>',
            '<div class="vc-proof-grid">',
              renderClearanceProofStatus(item),
              '<textarea class="vc-sent-proof-note" placeholder="Sent proof note, e.g. Sent manually from Outlook at 2:15 PM">' + escapeHtml(item.email_sent_proof_note || '') + '</textarea>',
              '<textarea class="vc-response-summary" placeholder="Response summary, e.g. Seller attorney confirmed receipt and contract prep">' + escapeHtml(item.response_summary || '') + '</textarea>',
              '<input class="vc-response-from-name" value="' + escapeHtml(item.response_from_name || '') + '" placeholder="Response from name">',
              '<input class="vc-response-from-email" value="' + escapeHtml(item.response_from_email || '') + '" placeholder="Response from email">',
              '<textarea class="vc-response-body" placeholder="Paste response text here, optional">' + escapeHtml(item.response_body || '') + '</textarea>',
              '<textarea class="vc-manager-proof-note" placeholder="Manager proof / override note, optional">' + escapeHtml(item.manager_proof_note || '') + '</textarea>',
              '<div class="vc-proof-actions">',
                '<button type="button" class="vc-mark-sent">Mark Sent</button>',
                '<button type="button" class="vc-log-response">Log Response</button>',
              '</div>',
            '</div>',
            '<button type="button" class="vc-save">Save</button>',
            '<button type="button" class="vc-email">Generate Draft Email</button>',
            '<div class="vc-email-status" aria-live="polite"></div>',
            '<div class="visual-clearance-draft-preview">' + renderClearanceDraftPreview(item.draft_email) + '</div>',
          '</div>',
        '</div>'
      ].join('');
    }).join('');

    section.innerHTML = [
      '<div class="visual-clearance-head">',
        '<div>',
          '<h2>Clearance Path</h2>',
          '<p>Hard visual status for the operator and AI. Notes are evidence; this checklist is the operational source of truth.</p>',
        '</div>',
        '<div class="visual-clearance-summary-actions">',
          '<div class="visual-clearance-badge">' + completeCount + ' of ' + items.length + ' cleared / N/A</div>',
          '<button type="button" class="visual-clearance-toggle" id="visualClearanceToggle">' + (visualClearanceExpanded ? 'Collapse' : 'Open') + '</button>',
        '</div>',
      '</div>',
      '<div class="visual-clearance-list">',
        rows || '<div class="visual-clearance-empty">No clearance items found for this file.</div>',
      '</div>'
    ].join('');


    if (visualClearanceExpanded) {
      section.classList.remove('is-collapsed');
    } else {
      section.classList.add('is-collapsed');
    }

    var toggle = document.getElementById('visualClearanceToggle');
    if (toggle) {
      toggle.addEventListener('click', function() {
        visualClearanceExpanded = !visualClearanceExpanded;
        if (visualClearanceExpanded) {
          section.classList.remove('is-collapsed');
          toggle.textContent = 'Collapse';
        } else {
          section.classList.add('is-collapsed');
          toggle.textContent = 'Open';
        }
      });
    }


    section.querySelectorAll('.vc-save').forEach(function(button) {
      button.addEventListener('click', async function() {
        var row = button.closest('.visual-clearance-row');
        var taskId = row.getAttribute('data-task');
        var state = row.querySelector('.vc-state').value;
        var source = row.querySelector('.vc-source').value;
        var note = row.querySelector('.vc-note').value;

        button.disabled = true;
        button.textContent = 'Saving';

        try {
          var response = await fetch('./api/deals/' + encodeURIComponent(dealId) + '/clearance-controls/' + encodeURIComponent(taskId), {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Accept': 'application/json'
            },
            body: JSON.stringify({
              control_state: state,
              clearance_source: source,
              clearance_evidence: note,
              office_contact_name: row.querySelector('.vc-contact-name') ? row.querySelector('.vc-contact-name').value : '',
              office_contact_email: row.querySelector('.vc-contact-email') ? row.querySelector('.vc-contact-email').value : '',
              office_contact_phone: row.querySelector('.vc-contact-phone') ? row.querySelector('.vc-contact-phone').value : '',
              waiting_on_name: row.querySelector('.vc-contact-name') ? row.querySelector('.vc-contact-name').value : '',
              email_sent_proof_note: row.querySelector('.vc-sent-proof-note') ? row.querySelector('.vc-sent-proof-note').value : '',
              response_from_name: row.querySelector('.vc-response-from-name') ? row.querySelector('.vc-response-from-name').value : '',
              response_from_email: row.querySelector('.vc-response-from-email') ? row.querySelector('.vc-response-from-email').value : '',
              response_summary: row.querySelector('.vc-response-summary') ? row.querySelector('.vc-response-summary').value : '',
              response_body: row.querySelector('.vc-response-body') ? row.querySelector('.vc-response-body').value : '',
              manager_proof_note: row.querySelector('.vc-manager-proof-note') ? row.querySelector('.vc-manager-proof-note').value : '',
              updated_by: 'operator'
            })
          });

          var data = await response.json();

          if (!response.ok || !data.ok) {
            throw new Error(data.error || 'Save failed.');
          }

          renderVisualClearancePath(section, dealId, data.clearance_items || []);
        } catch (err) {
          alert('Could not save clearance item: ' + err.message);
          button.disabled = false;
          button.textContent = 'Save';
        }
      });
    });


    section.querySelectorAll('.vc-mark-sent').forEach(function(button) {
      button.addEventListener('click', async function() {
        var row = button.closest('.visual-clearance-row');
        var taskId = row ? row.getAttribute('data-task') : '';
        if (!taskId) return alert('Could not identify this clearance item.');

        var proofNote = row.querySelector('.vc-sent-proof-note');
        if (proofNote && !String(proofNote.value || '').trim()) {
          proofNote.value = 'Sent manually by operator.';
        }

        button.disabled = true;
        button.textContent = 'Marking';

        try {
          var data = await postClearanceProof(dealId, taskId, collectClearanceProofPayload(row, 'mark_sent'));
          renderVisualClearancePath(section, dealId, data.clearance_items || []);
        } catch (err) {
          alert('Could not mark sent: ' + err.message);
          button.disabled = false;
          button.textContent = 'Mark Sent';
        }
      });
    });

    section.querySelectorAll('.vc-log-response').forEach(function(button) {
      button.addEventListener('click', async function() {
        var row = button.closest('.visual-clearance-row');
        var taskId = row ? row.getAttribute('data-task') : '';
        if (!taskId) return alert('Could not identify this clearance item.');

        var summary = row.querySelector('.vc-response-summary');
        if (summary && !String(summary.value || '').trim()) {
          alert('Enter a response summary first.');
          summary.focus();
          return;
        }

        button.disabled = true;
        button.textContent = 'Logging';

        try {
          var data = await postClearanceProof(dealId, taskId, collectClearanceProofPayload(row, 'log_response'));
          renderVisualClearancePath(section, dealId, data.clearance_items || []);
        } catch (err) {
          alert('Could not log response: ' + err.message);
          button.disabled = false;
          button.textContent = 'Log Response';
        }
      });
    });

    section.querySelectorAll('.vc-email').forEach(function(button) {
      button.addEventListener('click', async function() {
        var row = button.closest('.visual-clearance-row');
        var taskId = row ? row.getAttribute('data-task') : '';

        if (!taskId) {
          showClearanceEmailStatus(row, 'Could not identify this clearance item.', 'error');
          return;
        }

        clearClearanceEmailStatus(row);

        var nameInput = row.querySelector('.vc-contact-name');
        var emailInput = row.querySelector('.vc-contact-email');
        var phoneInput = row.querySelector('.vc-contact-phone');

        var name = nameInput ? String(nameInput.value || '').trim() : '';
        var email = emailInput ? String(emailInput.value || '').trim() : '';
        var phone = phoneInput ? String(phoneInput.value || '').trim() : '';

        if (!email) {
          showClearanceEmailStatus(row, 'Enter the recipient email in this clearance box, then click Generate Draft Email again.', 'error');
          if (emailInput) emailInput.focus();
          return;
        }

        button.disabled = true;
        button.textContent = 'Generating';
        showClearanceEmailStatus(row, 'Generating draft inside this clearance item...', '');

        try {
          await fetch('./api/deals/' + encodeURIComponent(dealId) + '/clearance-controls/' + encodeURIComponent(taskId), {
            credentials: 'same-origin',
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Accept': 'application/json'
            },
            cache: 'no-store',
            body: JSON.stringify({
              control_state: row.querySelector('.vc-state') ? row.querySelector('.vc-state').value : 'open',
              clearance_source: row.querySelector('.vc-source') ? row.querySelector('.vc-source').value : 'operator_entered',
              clearance_evidence: row.querySelector('.vc-note') ? row.querySelector('.vc-note').value : '',
              office_contact_name: name,
              office_contact_email: email,
              office_contact_phone: phone,
              waiting_on_name: name,
              updated_by: 'operator'
            })
          });

          var draftUrls = [
            './api/deals/' + encodeURIComponent(dealId) + '/clearance-draft-email',
            './api/dealdesk/deals/' + encodeURIComponent(dealId) + '/clearance-draft-email',
            './api/deals/' + encodeURIComponent(dealId) + '/clearance-controls/' + encodeURIComponent(taskId) + '/draft-email',
            './api/dealdesk/deals/' + encodeURIComponent(dealId) + '/clearance-controls/' + encodeURIComponent(taskId) + '/draft-email'
          ];

          var response = null;
          var rawText = '';

          for (var draftUrlIndex = 0; draftUrlIndex < draftUrls.length; draftUrlIndex++) {
            response = await fetch(draftUrls[draftUrlIndex], {
              credentials: 'same-origin',
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Accept': 'application/json'
              },
              cache: 'no-store',
              body: JSON.stringify({
                task_public_id: taskId,
                to_email: email,
                to_name: name,
                office_contact_phone: phone,
                from_email: 'teamscher@servicedepartment.ai',
                from_name: 'Team Scher',
                created_by: 'operator'
              })
            });

            rawText = await response.text();
            if (response.status !== 404) {
              break;
            }
          }

          var data = null;
          try {
            data = rawText ? JSON.parse(rawText) : {};
          } catch (jsonError) {
            var cleanText = rawText.replace(/<[^>]*>/g, ' ').replace(/\s+/g, ' ').trim();
            throw new Error('Draft Email returned HTML instead of JSON. HTTP ' + (response ? response.status : '') + '. ' + cleanText.slice(0, 180));
          }

          if (!response.ok || !data.ok) {
            throw new Error((data && data.error) || 'Could not create draft email.');
          }

          var draft = data.draft || data.email || data.email_message || data.message || null;
          if (draft && !draft.from_email) draft.from_email = 'teamscher@servicedepartment.ai';

          var preview = row.querySelector('.visual-clearance-draft-preview');
          if (preview) {
            preview.innerHTML = renderClearanceDraftPreview(draft);
          }

          showClearanceEmailStatus(row, 'Draft generated. Review it inside this clearance item, then click Send Email.', '');

          button.disabled = false;
          button.textContent = 'Generate Draft Email';
        } catch (err) {
          showClearanceEmailStatus(row, 'Could not create draft email: ' + err.message, 'error');
          button.disabled = false;
          button.textContent = 'Generate Draft Email';
        }
      });
    });

    // DEALDESK_CLEARANCE_SEND_DELEGATION_V1
    // Send buttons are created after the draft returns, so direct listeners miss them.
    // Use one delegated listener on the Clearance Path section.
    if (!section.dataset.vcSendDraftEmailDelegated) {
      section.dataset.vcSendDraftEmailDelegated = '1';

      section.addEventListener('click', async function(event) {
        var button = event.target && event.target.closest ? event.target.closest('.vc-send-draft-email') : null;
        if (!button || !section.contains(button)) return;

        event.preventDefault();
        event.stopPropagation();

        var row = button.closest('.visual-clearance-row');
        var emailId = button.getAttribute('data-email-id') || '';
        var toEmail = button.getAttribute('data-to-email') || '';

        if (!row || !emailId) {
          showClearanceEmailStatus(row, 'Could not identify the saved draft email to send.', 'error');
          return;
        }

        var ok = confirm('Send this email now?\n\nFrom: teamscher@servicedepartment.ai\nTo: ' + (toEmail || 'recipient') + '\n\nThis will record sent proof on this clearance item.');
        if (!ok) return;

        button.disabled = true;
        button.textContent = 'Sending';
        showClearanceEmailStatus(row, 'Sending email from teamscher@servicedepartment.ai...', '');

        try {
          await sendClearanceDraftEmail(dealId, row, emailId, toEmail);
          button.textContent = 'Sent';
        } catch (err) {
          showClearanceEmailStatus(row, 'Could not send email: ' + err.message, 'error');
          button.disabled = false;
          button.textContent = 'Send Email';
        }
      });
    }

  }


  function collectClearanceProofPayload(row, action) {
    return {
      proof_action: action,
      control_state: row.querySelector('.vc-state') ? row.querySelector('.vc-state').value : 'open',
      clearance_source: row.querySelector('.vc-source') ? row.querySelector('.vc-source').value : 'operator_entered',
      clearance_evidence: row.querySelector('.vc-note') ? row.querySelector('.vc-note').value : '',
      office_contact_name: row.querySelector('.vc-contact-name') ? row.querySelector('.vc-contact-name').value : '',
      office_contact_email: row.querySelector('.vc-contact-email') ? row.querySelector('.vc-contact-email').value : '',
      office_contact_phone: row.querySelector('.vc-contact-phone') ? row.querySelector('.vc-contact-phone').value : '',
      waiting_on_name: row.querySelector('.vc-contact-name') ? row.querySelector('.vc-contact-name').value : '',
      email_sent_proof_note: row.querySelector('.vc-sent-proof-note') ? row.querySelector('.vc-sent-proof-note').value : '',
      response_from_name: row.querySelector('.vc-response-from-name') ? row.querySelector('.vc-response-from-name').value : '',
      response_from_email: row.querySelector('.vc-response-from-email') ? row.querySelector('.vc-response-from-email').value : '',
      response_summary: row.querySelector('.vc-response-summary') ? row.querySelector('.vc-response-summary').value : '',
      response_body: row.querySelector('.vc-response-body') ? row.querySelector('.vc-response-body').value : '',
      manager_proof_note: row.querySelector('.vc-manager-proof-note') ? row.querySelector('.vc-manager-proof-note').value : '',
      updated_by: 'operator'
    };
  }

  async function postClearanceProof(dealId, taskId, payload) {
    var response = await fetch('./api/deals/' + encodeURIComponent(dealId) + '/clearance-controls/' + encodeURIComponent(taskId), {
      credentials: 'same-origin',
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Accept': 'application/json'
      },
      cache: 'no-store',
      body: JSON.stringify(payload)
    });

    var text = await response.text();
    var data = null;
    try {
      data = text ? JSON.parse(text) : {};
    } catch (err) {
      var clean = text.replace(/<[^>]*>/g, ' ').replace(/\s+/g, ' ').trim();
      throw new Error('Clearance proof route returned HTML instead of JSON. HTTP ' + response.status + '. ' + clean.slice(0, 180));
    }

    if (!response.ok || !data.ok) {
      throw new Error((data && data.error) || 'Could not save clearance proof.');
    }

    return data;
  }

  window.reloadVisualClearancePath = loadVisualClearancePath;

  window.addEventListener('load', function() {
    setTimeout(loadVisualClearancePath, 1200);
    setTimeout(loadVisualClearancePath, 2800);
  });
})();
</script>

<script id="status-clearance-gate-script">
(function () {
  var CLEARED = ['complete','completed','not_applicable','not applicable','na','n/a'];

  function dealId() {
    return new URLSearchParams(window.location.search).get('id') || '';
  }

  function taskText(task) {
    return Object.values(task || {}).filter(function(v) {
      return v !== null && v !== undefined;
    }).join(' ').toLowerCase();
  }

  function taskState(task) {
    return String(task.control_state || task.status || '').toLowerCase();
  }

  function isCleared(task) {
    return CLEARED.indexOf(taskState(task)) >= 0;
  }

  function matches(task, tests) {
    var text = taskText(task);
    return tests.every(function(test) { return test.test(text); });
  }

  function contractOutRequired(tasks) {
    return [
      { label:'Seller Attorney', found:tasks.find(function(t){ return matches(t, [/seller/, /attorney/]); }) },
      { label:'Purchaser Attorney', found:tasks.find(function(t){ return matches(t, [/(purchaser|buyer)/, /attorney/]); }) },
      { label:'Inspection', found:tasks.find(function(t){ return matches(t, [/inspection/]); }) },
      { label:'Seller acknowledgment', found:tasks.find(function(t){ return matches(t, [/seller/, /acknowledg/]); }) },
      { label:'Purchaser acknowledgment', found:tasks.find(function(t){ return matches(t, [/(purchaser|buyer)/, /acknowledg/]); }) },
      { label:'Property Condition Statement', found:tasks.find(function(t){ return matches(t, [/property/, /condition/]); }) }
    ];
  }

  function inContractRequired(tasks) {
    return [
      { label:'Contract', found:tasks.find(function(t){ return matches(t, [/contract/]); }) }
    ];
  }

  async function getClearanceTasks() {
    var id = dealId();
    if (!id) return [];

    var urls = [
      './api/deals/' + encodeURIComponent(id) + '/clearance-controls',
      './api/dealdesk/deals/' + encodeURIComponent(id) + '/clearance-controls'
    ];

    for (var i = 0; i < urls.length; i++) {
      try {
        var response = await fetch(urls[i], {
          headers:{ 'Accept':'application/json' },
          cache:'no-store'
        });
        if (!response.ok) continue;

        var data = await response.json();
        var tasks = data.tasks || data.items || data.clearance || data.rows || [];
        if (Array.isArray(tasks) && tasks.length) return tasks;
      } catch (err) {}
    }

    return [];
  }

  function messageBox(form) {
    var box = document.getElementById('statusGateMessage');
    if (!box && form) {
      box = document.createElement('div');
      box.id = 'statusGateMessage';
      box.style.margin = '0 0 12px';
      box.style.padding = '12px 14px';
      box.style.borderRadius = '14px';
      box.style.border = '1px solid #fde68a';
      box.style.background = '#fffbeb';
      box.style.color = '#92400e';
      box.style.fontWeight = '800';
      box.style.lineHeight = '1.4';
      box.style.display = 'none';
      form.parentNode.insertBefore(box, form);
    }
    return box;
  }

  function showBlock(form, title, items) {
    var box = messageBox(form);
    if (!box) return;

    box.innerHTML =
      title + '<br>' +
      'Clear or mark Not Applicable first:<br>- ' +
      items.map(function(x) { return String(x); }).join('<br>- ');

    box.style.display = 'block';
    openClearancePath();
    box.scrollIntoView({ behavior:'smooth', block:'center' });
  }

  function hideBlock(form) {
    var box = messageBox(form);
    if (box) {
      box.style.display = 'none';
      box.innerHTML = '';
    }
  }

  function openClearancePath() {
    var clearance = document.getElementById('visualClearancePath') ||
      document.querySelector('.visual-clearance-path') ||
      document.querySelector('[data-clearance-path]');

    if (!clearance) return;

    clearance.classList.add('open');
    clearance.classList.add('expanded');
    clearance.classList.add('is-open');

    clearance.querySelectorAll('details').forEach(function(detail) {
      detail.open = true;
    });

    clearance.querySelectorAll('[hidden]').forEach(function(el) {
      el.hidden = false;
    });

    Array.from(clearance.querySelectorAll('button, a')).forEach(function(el) {
      var text = (el.textContent || '').toLowerCase();
      if (/show|open|expand|details|clearance/.test(text)) {
        try { el.click(); } catch (err) {}
      }
    });

    setTimeout(function() {
      clearance.scrollIntoView({ behavior:'smooth', block:'start' });
    }, 100);
  }

  function unique(values) {
    var seen = {};
    return values.filter(function(value) {
      if (!value || seen[value]) return false;
      seen[value] = true;
      return true;
    });
  }

  function lockStatusOptions(select) {
    if (!select || select.dataset.stageGateLocked === '1') return;

    var current = select.value || 'Current Status';
    select.dataset.currentStatus = current;

    var values;

    if (current === 'Contract Out') {
      values = ['Contract Out', 'In Contract', 'On Hold'];
    } else if (current === 'In Contract') {
      values = ['In Contract', 'Closing Scheduled', 'On Hold'];
    } else if (current === 'Closing Scheduled') {
      values = ['Closing Scheduled', 'Closed', 'On Hold'];
    } else if (current === 'Closed' || current === 'Final') {
      values = [current];
    } else {
      values = [current, 'Contract Out', 'On Hold'];
    }

    values = unique(values);

    select.innerHTML = values.map(function(value) {
      return '<option' + (value === current ? ' selected' : '') + '>' + value + '</option>';
    }).join('');

    select.dataset.stageGateLocked = '1';
  }

  function blockersFrom(required) {
    return required
      .filter(function(item) { return !item.found || !isCleared(item.found); })
      .map(function(item) { return item.label; });
  }

  function installGate() {
    var form = document.getElementById('statusControlForm');
    var select = document.getElementById('transaction_status_select');
    var note = document.getElementById('status_note');

    if (!form || !select || form.dataset.clearanceGateInstalled === '1') return;

    lockStatusOptions(select);
    form.dataset.clearanceGateInstalled = '1';

    form.addEventListener('submit', async function(event) {
      if (form.dataset.clearanceGatePassed === '1') return;

      var selected = select.value;
      var current = select.dataset.currentStatus || '';

      hideBlock(form);

      if (selected === current) return;

      event.preventDefault();
      event.stopImmediatePropagation();

      if (selected === 'On Hold' && note && !String(note.value || '').trim()) {
        showBlock(form, 'Cannot place file On Hold yet.', ['Status Note is required.']);
        return;
      }

      var tasks = await getClearanceTasks();
      var blockers = [];

      if (selected === 'Contract Out') {
        blockers = blockersFrom(contractOutRequired(tasks));
        if (blockers.length) {
          showBlock(form, 'Cannot update to Contract Out yet.', blockers);
          return;
        }
      }

      if (selected === 'In Contract') {
        if (current !== 'Contract Out') {
          showBlock(form, 'Cannot update to In Contract yet.', ['File must first be Contract Out.']);
          return;
        }

        blockers = blockersFrom(inContractRequired(tasks));
        if (blockers.length) {
          showBlock(form, 'Cannot update to In Contract yet.', blockers);
          return;
        }
      }

      form.dataset.clearanceGatePassed = '1';
      form.dispatchEvent(new Event('submit', { bubbles:true, cancelable:true }));
      setTimeout(function() {
        delete form.dataset.clearanceGatePassed;
      }, 0);
    }, true);
  }

  function schedule() {
    setTimeout(installGate, 300);
    setTimeout(installGate, 1000);
    setTimeout(installGate, 2000);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', schedule);
  } else {
    schedule();
  }
})();
</script>

<script>
(function(){
  if (window.__dealdeskSupportPanelsCleanV1) return;
  window.__dealdeskSupportPanelsCleanV1 = true;

  function esc(v) {
    return String(v == null ? '' : v).replace(/[&<>"']/g, function(c) {
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c];
    });
  }

  function value(v) {
    if (v === null || v === undefined) return '';
    return String(v).trim();
  }

  function first() {
    for (var i = 0; i < arguments.length; i++) {
      var v = value(arguments[i]);
      if (v) return v;
    }
    return '';
  }

  function money(v) {
    if (v === null || v === undefined || v === '') return '';
    var n = Number(String(v).replace(/[^0-9.-]/g, ''));
    if (!Number.isFinite(n)) return String(v);
    return n.toLocaleString('en-US', { style:'currency', currency:'USD', maximumFractionDigits:0 });
  }

  function getDealId() {
    var p = new URLSearchParams(location.search);
    return p.get('id') || p.get('deal_id') || p.get('public_id') || '';
  }

  async function fetchJson(url) {
    var res = await fetch(url, { headers:{ Accept:'application/json' }, cache:'no-store' });
    var data = await res.json();
    if (!res.ok || data.ok === false) throw new Error(data.error || ('HTTP ' + res.status));
    return data;
  }

  async function loadDealRecord(id) {
    try {
      var data = await fetchJson('./api/deals/' + encodeURIComponent(id));
      return data.record || data.deal || data;
    } catch (err) {
      return null;
    }
  }

  function roleKey(p) {
    return String((p && (p.role_key || p.role || p.roleKey || p.party_role)) || '').toLowerCase();
  }

  function findParty(record, role) {
    var parties = record && (record.parties || record.deal_parties || record.contacts || []);
    if (!Array.isArray(parties)) return {};
    role = String(role || '').toLowerCase();

    for (var i = 0; i < parties.length; i++) {
      var p = parties[i] || {};
      if (roleKey(p) === role) return p;
    }

    if (role === 'lender') {
      for (var j = 0; j < parties.length; j++) {
        var q = parties[j] || {};
        var hay = [
          q.display_name, q.name, q.full_name, q.company_name, q.broker_name,
          q.email, q.role_key, q.role
        ].join(' ').toLowerCase();

        if (hay.indexOf('lender') !== -1 || hay.indexOf('loan') !== -1 || hay.indexOf('mortgage') !== -1 || hay.indexOf('rate') !== -1 || hay.indexOf('affinity') !== -1) {
          return q;
        }
      }
    }

    return {};
  }

  function supportCard(id, title, note, bodyHtml) {
    var section = document.createElement('section');
    section.id = id;
    section.className = 'dd-support-card';
    section.innerHTML =
      '<h2>' + esc(title) + '</h2>' +
      (note ? '<p class="dd-support-note">' + esc(note) + '</p>' : '') +
      bodyHtml;
    return section;
  }

  function supportItem(title, meta, href, actionText) {
    return '<div class="dd-support-item">' +
      '<div class="dd-support-item-main">' +
        '<strong class="dd-support-item-title">' + esc(title || 'Document') + '</strong>' +
        '<span class="dd-support-item-meta">' + esc(meta || '') + '</span>' +
      '</div>' +
      (href ? '<a class="dd-support-action" href="' + esc(href) + '" target="_blank" rel="noopener">' + esc(actionText || 'View') + '</a>' : '') +
    '</div>';
  }

  function supportField(label, val) {
    val = value(val);
    return '<div class="dd-support-field">' +
      '<div class="dd-support-label">' + esc(label) + '</div>' +
      '<div class="dd-support-value">' + esc(val || '—') + '</div>' +
    '</div>';
  }

  async function buildSourceDocumentsPanel(id) {
    var docs = [];
    var claireResult = null;

    try {
      var data = await fetchJson('./api/claire-dealview/source-docs?deal_id=' + encodeURIComponent(id));
      docs = data.source_documents || [];
      claireResult = data.claire_result || null;
    } catch (err) {}

    var body = '';
    if (docs.length) {
      body = '<div class="dd-support-list">' + docs.map(function(d) {
        return supportItem(d.filename || 'Source document', 'PDF source document', d.url, 'View PDF');
      }).join('') + '</div>';
    } else {
      body = '<div class="dd-support-empty">No CLAIRE PDF source links found yet. Recreate the deal from the CLAIRE reader or save source documents again.</div>';
    }

    if (claireResult) {
      var f = claireResult.dealdesk_fields || {};
      var bits = [];
      function list(label, arr) {
        if (!Array.isArray(arr) || !arr.length) return;
        bits.push('<div class="dd-support-item"><div class="dd-support-item-main"><strong class="dd-support-item-title">' + esc(label) + '</strong><span class="dd-support-item-meta">' + esc(arr.join(' | ')) + '</span></div></div>');
      }
      list('Notes', f.notes || claireResult.notes);
      list('Review Flags', f.review_flags || claireResult.review_flags);
      list('Missing Items', f.missing_items || claireResult.missing_items);
      if (bits.length) body += '<details style="margin-top:12px;"><summary style="cursor:pointer;font-weight:900;">CLAIRE Intake Notes</summary><div class="dd-support-list" style="margin-top:10px;">' + bits.join('') + '</div></details>';
    }

    return supportCard(
      'accepted-offer-source-documents',
      'Accepted Offer Source Documents',
      'Original PDFs and CLAIRE source documents preserved from intake.',
      body
    );
  }

  async function buildGeneratedDocumentsPanel(id) {
    var docs = [];

    try {
      var data = await fetchJson('./api/claire-dealview/generated-docs?deal_id=' + encodeURIComponent(id));
      docs = data.documents || [];
    } catch (err) {}

    var body = docs.length
      ? '<div class="dd-support-list">' + docs.map(function(d) {
          var meta = 'Status: ' + (d.email_status || 'created');
          if (d.email_to) meta += ' | Sent to: ' + d.email_to;
          if (d.email_subject) meta += ' | Subject: ' + d.email_subject;
          return supportItem(d.filename || 'Generated document', meta, d.url, 'View PDF');
        }).join('') + '</div>'
      : '<div class="dd-support-empty">No generated/sent documents yet. This section will show the printed Deal Sheet PDF after CLAIRE creates the deal and emails it.</div>';

    return supportCard(
      'generatedSentDocumentsPanel',
      'Generated / Sent Documents',
      'Documents Deal Desk creates from the accepted-offer file and sends automatically.',
      body
    );
  }

  function buildClaireIntakePanel(id) {
    var body = '<div class="dd-support-item">' +
      '<div class="dd-support-item-main">' +
        '<strong class="dd-support-item-title">CLAIRE Intake Read / Notes</strong>' +
        '<span class="dd-support-item-meta">Full CLAIRE document read, notes, flags, missing items, and conflicts preserved from intake.</span>' +
      '</div>' +
      '<a class="dd-support-action" href="./claire-intake-read.html?id=' + encodeURIComponent(id) + '">View Read</a>' +
    '</div>';

    return supportCard(
      'claire-intake-read-link-card',
      'CLAIRE Intake Read',
      'Full CLAIRE intake read and document notes for this accepted-offer file.',
      body
    );
  }

  function buildLenderPanel(record) {
    record = record || {};
    var deal = record.deal || record || {};
    var f = record.financials || {};
    var lender = findParty(record, 'lender');

    var lenderName = first(lender.display_name, lender.name, lender.full_name, lender.contact_name, lender.loan_officer_name, deal.lender_name, deal.loan_officer_name);
    var lenderCompany = first(lender.company_name, lender.broker_name, lender.lender_company, deal.lender_company, deal.lender, deal.financing_lender);
    var lenderEmail = first(lender.email, lender.email_address, lender.loan_officer_email, deal.lender_email, deal.loan_officer_email);
    var lenderPhone = first(lender.phone, lender.phone_number, lender.mobile, lender.loan_officer_phone, deal.lender_phone, deal.loan_officer_phone);
    var nmls = first(lender.nmls, lender.nmls_number, deal.nmls, deal.loan_officer_nmls);
    var mortgage = first(f.mortgage_amount, f.loan_amount, deal.mortgage_amount, deal.loan_amount);
    var preapprovalAmount = first(deal.preapproval_amount, deal.preapproval_offer_price, f.preapproval_amount);
    var financingStatus = first(deal.financing_status, deal.mortgage_status, deal.financing, f.financing_status);
    var contingency = first(deal.financing_contingency_length, deal.financing_contingency, f.financing_contingency_length);
    var expiration = first(deal.preapproval_expiration, f.preapproval_expiration);

    var fields =
      supportField('Lender / Company', lenderCompany) +
      supportField('Loan Officer / Contact', lenderName) +
      supportField('Email', lenderEmail) +
      supportField('Phone', lenderPhone) +
      supportField('NMLS', nmls) +
      supportField('Mortgage / Loan Amount', mortgage ? money(mortgage) : '') +
      supportField('Preapproval Amount', preapprovalAmount ? money(preapprovalAmount) : '') +
      supportField('Financing Status', financingStatus) +
      supportField('Financing Contingency', contingency) +
      supportField('Preapproval Expiration', expiration);

    return supportCard(
      'lenderFinancingPanel',
      'Lender / Financing',
      'Loan, lender, and financing information saved to this accepted-offer file.',
      '<div class="dd-support-fields">' + fields + '</div>'
    );
  }

  function removeOldPanels() {
    [
      'dealDocumentsPanel',
      'accepted-offer-source-documents',
      'generatedSentDocumentsPanel',
      'claire-intake-read-link-card',
      'lenderFinancingPanel',
      'dealdeskSupportPanelsStack'
    ].forEach(function(id) {
      var el = document.getElementById(id);
      if (el) el.remove();
    });

    Array.from(document.querySelectorAll('.claire-pdf-source-links-card,.claire-source-docs-card')).forEach(function(el) {
      el.remove();
    });
  }

  function findDangerZone() {
    return document.querySelector('.danger-zone') || Array.from(document.querySelectorAll('section,.card')).find(function(el) {
      return /remove accepted offer/i.test(el.textContent || '');
    });
  }

  async function renderSupportPanels() {
    var id = getDealId();
    if (!id) return;

    var danger = findDangerZone();
    if (!danger || !danger.parentNode) return;

    removeOldPanels();

    var record = await loadDealRecord(id);

    var stack = document.createElement('div');
    stack.id = 'dealdeskSupportPanelsStack';
    stack.className = 'dd-support-stack';

    var sourcePanel = await buildSourceDocumentsPanel(id);
    var generatedPanel = await buildGeneratedDocumentsPanel(id);
    var clairePanel = buildClaireIntakePanel(id);
    var lenderPanel = buildLenderPanel(record);

    stack.appendChild(sourcePanel);
    stack.appendChild(generatedPanel);
    stack.appendChild(clairePanel);
    stack.appendChild(lenderPanel);

    danger.parentNode.insertBefore(stack, danger);
  }

  function scheduleRender() {
    renderSupportPanels();
    var tries = 0;
    var timer = setInterval(function() {
      tries += 1;
      renderSupportPanels();
      if (tries >= 8) clearInterval(timer);
    }, 500);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', scheduleRender);
  } else {
    scheduleRender();
  }

  window.addEventListener('load', function() {
    setTimeout(scheduleRender, 800);
  });
})();
</script>
<!-- END_DEALDESK_SUPPORT_PANELS_CLEAN_V1 -->
