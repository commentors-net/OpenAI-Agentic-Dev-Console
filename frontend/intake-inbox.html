<!doctype html><html lang="en"><head><meta charset="utf-8"><title>CLAIRE Intake Inbox | Deal Desk</title><meta name="viewport" content="width=device-width, initial-scale=1"><style>body{margin:0;font-family:Arial,sans-serif;background:#f4f7fb;color:#0f172a}.top{background:linear-gradient(135deg,#0f172a,#0f766e);color:white;padding:18px 22px;display:flex;justify-content:space-between;align-items:center;gap:12px}.top h1{margin:0;font-size:22px}.top p{margin:4px 0 0;color:#dbeafe}.top a{color:white;text-decoration:none;border:1px solid rgba(255,255,255,.45);border-radius:10px;padding:8px 12px}.wrap{max-width:1200px;margin:0 auto;padding:20px}.cards{display:grid;gap:14px}.card{background:white;border:1px solid #dbe3ef;border-radius:16px;padding:16px;box-shadow:0 10px 28px rgba(15,23,42,.08)}.card-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.subject{font-weight:900;font-size:18px}.meta{color:#64748b;font-size:13px;margin-top:4px}.badge{border-radius:999px;padding:6px 10px;font-size:12px;font-weight:900;background:#e0f2fe;color:#075985;white-space:nowrap}.needs{background:#fef3c7;color:#92400e}.rejected{background:#fee2e2;color:#991b1b}.created{background:#dcfce7;color:#166534}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}.cell{background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:10px}.label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;font-weight:900;color:#64748b;margin-bottom:4px}.value{font-weight:800}.missing{margin-top:12px;color:#b45309;font-size:13px}.actions{margin-top:14px;display:flex;gap:8px;flex-wrap:wrap}button,.button{border:0;border-radius:10px;padding:9px 12px;background:#0f766e;color:white;cursor:pointer;font-weight:800;text-decoration:none;display:inline-block}button.danger{background:#b91c1c}.empty{background:white;border:1px dashed #cbd5e1;border-radius:16px;padding:20px;color:#64748b}@media(max-width:850px){.grid{grid-template-columns:1fr}.card-head{flex-direction:column}}</style></head><body><div class="top"><div><h1>CLAIRE Intake Inbox</h1><p>Email-to-Intake drafts for accepted offers.</p></div><a href="./dashboard.html">Back to Command Center</a></div><main class="wrap"><div id="list" class="cards"><div class="empty">Loading intake drafts...</div></div></main><script>function escapeHtml(v){return String(v==null?'':v).replace(/[&<>"']/g,function(ch){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch])})}async function fetchJson(url,options){const res=await fetch(url,Object.assign({headers:{Accept:'application/json'},cache:'no-store'},options||{}));const text=await res.text();let data;try{data=text?JSON.parse(text):{}}catch(err){throw new Error('API returned HTML/non-JSON HTTP '+res.status+': '+text.replace(/<[^>]*>/g,' ').slice(0,160))}if(!res.ok||data.ok===false)throw new Error(data.error||'Request failed');return data}function statusClass(s){if(s==='Needs Review')return'badge needs';if(s==='Rejected')return'badge rejected';if(s==='Created')return'badge created';return'badge'}function render(drafts){const target=document.getElementById('list');if(!drafts.length){target.innerHTML='<div class="empty">No intake drafts yet. Once the email worker is enabled, new accepted-offer emails will appear here.</div>';return}target.innerHTML=drafts.map(d=>{const missing=d.missing_fields||[];const dup=d.duplicate_check&&d.duplicate_check.possible_duplicate;return['<section class="card">','<div class="card-head"><div><div class="subject">'+escapeHtml(d.property_address||d.subject||'New intake draft')+'</div><div class="meta">From: '+escapeHtml([d.from_name,d.from_email].filter(Boolean).join(' - '))+' | Subject: '+escapeHtml(d.subject||'')+'</div></div><div class="'+statusClass(d.draft_status)+'">'+escapeHtml(d.draft_status||'Needs Review')+'</div></div>','<div class="grid"><div class="cell"><div class="label">Confidence</div><div class="value">'+escapeHtml(d.confidence_score||0)+'%</div></div><div class="cell"><div class="label">Received</div><div class="value">'+escapeHtml(d.received_at||'')+'</div></div><div class="cell"><div class="label">Duplicate Check</div><div class="value">'+(dup?'Possible duplicate':'No obvious duplicate')+'</div></div></div>',missing.length?'<div class="missing"><strong>Missing:</strong> '+escapeHtml(missing.join(', '))+'</div>':'','<div class="actions"><a class="button" href="./intake-review.html?id='+encodeURIComponent(d.public_id)+'">Review Draft</a><button class="danger" data-reject="'+escapeHtml(d.public_id)+'">Reject</button></div></section>'].join('')}).join('');target.querySelectorAll('[data-reject]').forEach(btn=>{btn.addEventListener('click',async()=>{if(!confirm('Reject this intake draft?'))return;btn.disabled=true;try{await fetchJson('./api/intake-drafts/'+encodeURIComponent(btn.getAttribute('data-reject'))+'/reject',{method:'POST',headers:{'Content-Type':'application/json',Accept:'application/json'},body:JSON.stringify({reviewed_by:'operator'})});load()}catch(err){alert(err.message);btn.disabled=false}})})}async function load(){try{const data=await fetchJson('./api/intake-drafts');render(data.drafts||[])}catch(err){document.getElementById('list').innerHTML='<div class="empty">Could not load intake drafts: '+escapeHtml(err.message)+'</div>'}}load();</script></body></html>
